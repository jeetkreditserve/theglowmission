services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-theglowmission}
      POSTGRES_USER: ${POSTGRES_USER:-theglowmission}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-theglowmission}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-theglowmission} -d ${POSTGRES_DB:-theglowmission}"]
      interval: 10s
      timeout: 5s
      retries: 5

  backend:
    build:
      context: .
      dockerfile: infra/docker/backend.Dockerfile
    env_file: .env
    depends_on:
      postgres:
        condition: service_healthy
    expose:
      - "8000"
    command: ["/app/scripts/backend-entrypoint.sh"]

  frontend:
    build:
      context: .
      dockerfile: infra/docker/frontend.Dockerfile
    env_file: .env
    depends_on:
      - backend
    expose:
      - "3000"

  nginx:
    build:
      context: .
      dockerfile: infra/docker/nginx.Dockerfile
    depends_on:
      - backend
      - frontend
    ports:
      - "1723:1723"

volumes:
  postgres_data:
